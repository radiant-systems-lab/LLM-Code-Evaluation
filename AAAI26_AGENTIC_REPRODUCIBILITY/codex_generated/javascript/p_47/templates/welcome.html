<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Welcome Email</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f8fafc; color: #0f172a; }
      .container { max-width: 600px; margin: 0 auto; background: #ffffff; padding: 24px; border-radius: 12px; }
      h1 { color: #2563eb; }
      .cta { display: inline-block; padding: 12px 20px; background: #2563eb; color: #ffffff; text-decoration: none; border-radius: 8px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Hello {{name}},</h1>
      <p>We're excited to have you join <strong>{{company}}</strong>. Here is a quick overview:</p>
      <ul>
        <li>Plan: {{plan}}</li>
        <li>Start date: {{startDate}}</li>
      </ul>
      <p>Click below to get started.</p>
      <a class="cta" href="{{ctaUrl}}">Get Started</a>
    </div>
  </body>
</html>
