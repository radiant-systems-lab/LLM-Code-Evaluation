spring.application.name=spring-email-service

# Configure your SMTP provider details here.
# For local testing you can use MailHog (default host/port shown below).
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Default sender (override per message if desired by calling helper#setFrom).
spring.mail.default-encoding=UTF-8

# Thymeleaf configuration
spring.thymeleaf.cache=false

logging.level.com.example.emailservice=INFO
