<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <title th:text="${subject != null} ? ${subject} : 'Notification'">Notification</title>
    <style>
      body {
        margin: 0;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background-color: #f5f6fa;
        color: #1f2933;
      }
      .container {
        max-width: 620px;
        margin: 24px auto;
        padding: 24px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 12px 32px rgba(96, 97, 112, 0.15);
      }
      h1 {
        color: #075985;
        margin-bottom: 12px;
      }
      .cta {
        display: inline-block;
        margin-top: 24px;
        padding: 12px 28px;
        color: #ffffff;
        background: linear-gradient(135deg, #2563eb, #0ea5e9);
        border-radius: 999px;
        text-decoration: none;
        font-weight: bold;
      }
      .footer {
        margin-top: 40px;
        font-size: 12px;
        color: #65748b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <p style="font-size: 14px; letter-spacing: 1.4px; color: #64748b; text-transform: uppercase;">
        [[${preheader}]]
      </p>
      <h1>[[${title}]]</h1>
      <p th:utext="${message}">
        This is a HTML fallback message if <code>message</code> is not provided.
      </p>
      <div th:if="${ctaUrl}">
        <a th:href="${ctaUrl}" class="cta" th:text="${ctaText ?: 'View details'}">View details</a>
      </div>
      <div class="footer">
        <p>Sent by Spring Email Service.</p>
      </div>
    </div>
  </body>
</html>
