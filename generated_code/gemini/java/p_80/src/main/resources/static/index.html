<!DOCTYPE html>
<html>
<head>
    <title>Spring Boot WebSocket Chat</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        #chat-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        #messageForm {
            display: flex;
        }
        #messageInput {
            flex-grow: 1;
            margin-right: 10px;
        }
        #messageArea {
            height: 300px;
            overflow-y: scroll;
            border: 1px solid #eee;
            padding: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <h2 class="text-center">Spring Boot WebSocket Chat</h2>
        <div id="username-page">
            <div class="form-group">
                <input type="text" id="name" placeholder="Enter your name" class="form-control"/>
            </div>
            <div class="form-group">
                <button type="button" id="joinChat" class="btn btn-primary btn-block">Join Chat</button>
            </div>
        </div>

        <div id="chat-page" style="display: none;">
            <div id="messageArea"></div>
            <form id="messageForm" name="messageForm">
                <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" class="form-control"/>
                <button type="submit" class="btn btn-success">Send</button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        var stompClient = null;
        var username = null;

        var usernamePage = document.querySelector('#username-page');
        var chatPage = document.querySelector('#chat-page');
        var joinChatButton = document.querySelector('#joinChat');
        var messageForm = document.querySelector('#messageForm');
        var messageInput = document.querySelector('#messageInput');
        var messageArea = document.querySelector('#messageArea');

        function connect() {
            username = document.querySelector('#name').value.trim();

            if(username) {
                usernamePage.classList.add('hidden');
                chatPage.style.display = 'block';

                var socket = new SockJS('/ws');
                stompClient = Stomp.over(socket);

                stompClient.connect({}, onConnected, onError);
            }
        }

        function onConnected() {
            // Subscribe to the Public Topic
            stompClient.subscribe('/topic/public', onMessageReceived);

            // Tell your username to the server
            stompClient.send("/app/chat.addUser",
                {}, JSON.stringify({sender: username, type: 'JOIN'})
            )
        }

        function onError(error) {
            console.error('Could not connect to WebSocket server. Please refresh this page to try again!', error);
        }

        function sendMessage(event) {
            var messageContent = messageInput.value.trim();
            if(messageContent && stompClient) {
                var chatMessage = {
                    sender: username,
                    content: messageInput.value,
                    type: 'CHAT'
                };
                stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(chatMessage));
                messageInput.value = '';
            }
            event.preventDefault();
        }

        function onMessageReceived(payload) {
            var message = JSON.parse(payload.body);

            var messageElement = document.createElement('li');

            if(message.type === 'JOIN') {
                messageElement.classList.add('event-message');
                message.content = message.sender + ' joined!';
            } else if (message.type === 'LEAVE') {
                messageElement.classList.add('event-message');
                message.content = message.sender + ' left!';
            } else {
                messageElement.classList.add('chat-message');
                var usernameElement = document.createElement('span');
                var usernameText = document.createTextNode(message.sender);
                usernameElement.appendChild(usernameText);
                messageElement.appendChild(usernameElement);
            }

            var textElement = document.createElement('p');
            var messageText = document.createTextNode(message.content);
            textElement.appendChild(messageText);

            messageElement.appendChild(textElement);
            messageArea.appendChild(messageElement);
            messageArea.scrollTop = messageArea.scrollHeight;
        }

        joinChatButton.addEventListener('click', connect, true);
        messageForm.addEventListener('submit', sendMessage, true);
    </script>
</body>
</html>
