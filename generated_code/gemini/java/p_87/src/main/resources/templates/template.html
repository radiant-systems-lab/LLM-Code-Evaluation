<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>PDF Template</title>
    <style>
        body {
            font-family: sans-serif;
        }
        h1 {
            color: #4CAF50;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Certificate of Completion</h1>
    <p>This is to certify that <b th:text="${name}"></b> has successfully completed the course on <b th:text="${course}"></b>.</p>
    <img src="https://via.placeholder.com/150" alt="Placeholder Image"/>
    <h2>Course Details</h2>
    <table>
        <thead>
            <tr>
                <th>Topic</th>
                <th>Duration (hours)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Introduction</td>
                <td>2</td>
            </tr>
            <tr>
                <td>Core Concepts</td>
                <td>5</td>
            </tr>
            <tr>
                <td>Advanced Topics</td>
                <td>3</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
